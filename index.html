<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Afnan Isane | Portfolio</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial, Helvetica, sans-serif;
            background:#0f172a;
            color:#fff;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .card{
            text-align:center;
            padding:50px;
            border-radius:16px;
            background:#1e293b;
            box-shadow:0 10px 30px rgba(0,0,0,.3);
            max-width:600px;
        }

        h1{
            font-size:42px;
            margin-bottom:10px;
        }

        p{
            color:#cbd5e1;
            margin-bottom:30px;
            line-height:1.6;
        }

        a{
            display:inline-block;
            padding:14px 30px;
            background:#f97316;
            color:#fff;
            text-decoration:none;
            border-radius:8px;
            font-weight:bold;
            transition:.3s;
        }

        a:hover{
            background:#ea580c;
            transform:translateY(-3px);
        }
    </style>
</head>
<body>

<div class="card">
    <h1>🚀 GitHub Pages is Live!</h1>

    <p>
        Welcome to <strong>Afnan Isane's Portfolio</strong>.<br>
        If you're seeing this page, GitHub Pages has been configured successfully.
    </p>

    <a href="https://github.com/afnan-isane" target="_blank">
        Visit My GitHub
    </a>

</div>

</body>
</html>
